<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Assistant - Llama 3 70B</title>
    <!-- Tích hợp Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cấu hình màu sắc và style phụ -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        groq: '#f55036', // Màu chủ đạo của Groq
                    }
                }
            }
        }
    </script>
    <style>
        /* Tùy chỉnh thanh cuộn (Scrollbar) cho chuyên nghiệp */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }
        
        /* Hiệu ứng loading */
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #9CA3AF;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-900 to-black min-h-screen flex items-center justify-center p-4 sm:p-8 font-sans text-gray-100">

    <!-- Main Chat Container (Glassmorphism) -->
    <div class="w-full max-w-5xl bg-gray-800/60 backdrop-blur-xl border border-gray-700/50 rounded-2xl shadow-2xl flex flex-col h-[90vh] overflow-hidden">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-700/50 bg-gray-900/50">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                <h1 class="text-xl font-bold bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">
                    Llama 3 (70B) Code Research
                </h1>
            </div>
            <!-- API Key Input -->
            <div class="flex items-center gap-2">
                <input type="password" id="apiKey" placeholder="Nhập Groq API Key..." 
                    class="bg-gray-950 border border-gray-700 text-sm rounded-lg px-3 py-1.5 focus:outline-none focus:border-orange-500 transition-colors w-48 sm:w-64">
            </div>
        </div>

        <!-- Chat History Area -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Lời chào mặc định -->
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center font-bold text-sm shadow-lg shrink-0">AI</div>
                <div class="bg-gray-700/50 border border-gray-600/50 text-gray-200 px-4 py-3 rounded-2xl rounded-tl-none max-w-[85%] whitespace-pre-wrap leading-relaxed">Xin chào! Tôi là trợ lý AI chạy trên mô hình Llama 3 70B của Groq. Anh có câu hỏi hay đoạn code nào cần nghiên cứu chuyên sâu không? Hãy nhập API Key ở góc trên bên phải để bắt đầu.</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 sm:p-6 border-t border-gray-700/50 bg-gray-800/80">
            <div class="relative flex items-end gap-2">
                <textarea id="userInput" rows="1" placeholder="Nhập câu hỏi hoặc paste code vào đây (Shift + Enter để xuống dòng)..." 
                    class="w-full bg-gray-950 border border-gray-700 text-gray-100 rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 transition-all resize-none max-h-48 overflow-y-auto whitespace-pre-wrap"></textarea>
                
                <button id="sendBtn" onclick="sendMessage()" 
                    class="absolute right-2 bottom-2 w-10 h-10 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-400 hover:to-red-500 text-white rounded-lg flex items-center justify-center transition-all shadow-lg active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                        <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Script xử lý Logic & Gọi API Groq -->
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKey');
        let chatHistory = [
            { role: "system", content: "You are an expert software engineer and code researcher. You provide deep, accurate, and professional explanations of code, architecture, and algorithms." }
        ];

        // Tự động điều chỉnh chiều cao textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = 'auto';
        });

        // Xử lý phím Enter để gửi (Shift+Enter để xuống dòng)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!text) return;
            if (!apiKey) {
                alert("Vui lòng nhập Groq API Key ở góc trên cùng bên phải!");
                apiKeyInput.focus();
                return;
            }

            // 1. Thêm tin nhắn của User vào UI
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            chatHistory.push({ role: "user", content: text });

            // 2. Hiện hiệu ứng Loading
            const loadingId = showLoading();

            try {
                // 3. Gọi API Groq (Chuẩn OpenAI tương thích)
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3-70b-8192", // Model 70 tỷ tham số siêu tốc độ của Groq
                        messages: chatHistory,
                        temperature: 0.2, // Nhiệt độ thấp để code/research chính xác hơn
                        max_tokens: 4096
                    })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (response.ok) {
                    const aiContent = data.choices[0].message.content;
                    appendMessage('ai', aiContent);
                    chatHistory.push({ role: "assistant", content: aiContent });
                } else {
                    appendMessage('error', `Lỗi API: ${data.error?.message || 'Không thể kết nối'}`);
                }

            } catch (error) {
                removeLoading(loadingId);
                appendMessage('error', `Lỗi hệ thống: ${error.message}`);
            }
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-4 ${sender === 'user' ? 'flex-row-reverse' : ''}`;
            
            let avatar = '';
            let bubbleStyle = '';

            if (sender === 'user') {
                avatar = `<div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm shadow-lg shrink-0">U</div>`;
                bubbleStyle = `bg-blue-600 text-white rounded-tr-none`;
            } else if (sender === 'ai') {
                avatar = `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center font-bold text-sm shadow-lg shrink-0">AI</div>`;
                bubbleStyle = `bg-gray-700/50 border border-gray-600/50 text-gray-200 rounded-tl-none font-mono text-sm`;
            } else {
                avatar = `<div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center font-bold text-sm shadow-lg shrink-0">!</div>`;
                bubbleStyle = `bg-red-900/50 border border-red-500/50 text-red-200 rounded-tl-none`;
            }

            // Dùng DOMPurify thực tế sẽ tốt hơn, nhưng ở đây dùng textContent hoặc thủ thuật bọc code cơ bản để render an toàn
            const escapedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            msgDiv.innerHTML = `
                ${avatar}
                <div class="${bubbleStyle} px-4 py-3 rounded-2xl max-w-[85%] whitespace-pre-wrap leading-relaxed overflow-x-auto shadow-sm">
                    ${escapedText}
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function showLoading() {
            const id = 'loading-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = `flex gap-4`;
            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center font-bold text-sm shadow-lg shrink-0">AI</div>
                <div class="bg-gray-700/50 border border-gray-600/50 px-4 py-4 rounded-2xl rounded-tl-none flex items-center">
                    <div class="typing-indicator flex gap-1">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
